<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Karaoke</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="stats-view" class="hidden">
    <div id="stats-header">
      <button id="stats-back-btn">← Back</button>
      <h2>Stats</h2>
    </div>
    <div id="stats-body">
      <div class="stat-row">
        <span class="stat-label">Blocks completed</span>
        <span class="stat-value" id="stat-blocks">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Sessions completed</span>
        <span class="stat-value" id="stat-sessions">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Total focus time</span>
        <span class="stat-value" id="stat-time">0m</span>
      </div>
    </div>
  </div>

  <div id="app">
    <div id="app-header">
      <h1>🎤 Focus Karaoke</h1>
      <button id="stats-btn">📊</button>
    </div>
    <div id="mode-label">Ready</div>
    <div id="timer">25:00</div>
    <div id="session-label"></div>
    <div id="success-msg"></div>
    <div id="settings">
      <div class="settings-row">
        <label for="work-input">Work</label>
        <input id="work-input" type="number" min="0" max="120" value="25">
        <span>min</span>
        <input id="work-seconds-input" type="number" min="0" max="59" value="0">
        <span>sec</span>
      </div>
      <div class="settings-row">
        <label for="sessions-input">Sessions</label>
        <input id="sessions-input" type="number" min="1" max="20" value="4">
      </div>
    </div>
    <button id="main-btn">Start Focus</button>
    <button id="leave-btn">Leave Focus</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
